<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020024"/>
      <stop offset="50%" stop-color="#090979"/>
      <stop offset="100%" stop-color="#020024"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff;#ffffff;#00d4ff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="900" height="200" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="180" y1="0" x2="180" y2="200" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="360" y1="0" x2="360" y2="200" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="540" y1="0" x2="540" y2="200" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <line x1="720" y1="0" x2="720" y2="200" stroke="#00d4ff" stroke-width="0.3" opacity="0.2"/>
  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="3" fill="#00d4ff" opacity="0.15">
    <animate attributeName="y" values="0;197;0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Corner accents -->
  <polyline points="0,30 0,0 30,0" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <polyline points="870,0 900,0 900,30" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <polyline points="0,170 0,200 30,200" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <polyline points="870,200 900,200 900,170" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <!-- Main title -->
  <text x="450" y="95" font-family="monospace" font-size="42" font-weight="bold" text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)">PHANEENDRA KUMAR</text>
  <text x="450" y="140" font-family="monospace" font-size="16" text-anchor="middle" fill="#a78bfa" letter-spacing="4">SENIOR DATA ENGINEER</text>
  <text x="450" y="168" font-family="monospace" font-size="11" text-anchor="middle" fill="#64748b" letter-spacing="2">AWS · AZURE · GCP · KAFKA · SPARK · dbt · SNOWFLAKE</text>
  <!-- Blinking cursor -->
  <rect x="632" y="120" width="10" height="18" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
